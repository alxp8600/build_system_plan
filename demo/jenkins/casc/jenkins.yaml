jenkins:
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
  crumbIssuer:
    standard:
      excludeClientIPFromCrumb: false
  disableRememberMe: false
  disabledAdministrativeMonitors:
  - "hudson.model.UpdateCenter$CoreUpdateMonitor"
  labelAtoms:
  - name: "built-in"
  - name: "windows-build"
  log: {
    }
  markupFormatter: "plainText"
  mode: NORMAL
  nodeMonitors:
  - "architecture"
  - "clock"
  - diskSpace:
      freeSpaceThreshold: "1GiB"
      freeSpaceWarningThreshold: "2GiB"
  - "swapSpace"
  - tmpSpace:
      freeSpaceThreshold: "1GiB"
      freeSpaceWarningThreshold: "2GiB"
  - "responseTime"
  nodes:
  - permanent:
      launcher: "inbound"
      mode: EXCLUSIVE
      name: "windows-build"
      nodeDescription: "build win jobs"
      numExecutors: 2
      remoteFS: "C:\\JenkinsAgent\\workspace"
      retentionStrategy: "always"
  - permanent:
      launcher: "inbound"
      mode: EXCLUSIVE
      name: "mac-build"
      nodeDescription: "build mac jobs"
      numExecutors: 2
      remoteFS: "/Users/jenkins-agent/jenkinsAgent"
      retentionStrategy: "always"
  numExecutors: 2
  primaryView:
    all:
      name: "all"
  projectNamingStrategy: "standard"
  quietPeriod: 5
  remotingSecurity:
    enabled: false
  scmCheckoutRetryCount: 2
  securityRealm:
    local:
      allowsSignup: false
      enableCaptcha: false
      users:
      - id: "admin"
        name: "admin"
        password: ${JENKINS_ADMIN_PASSWORD}
        properties:
        - "apiToken"
        - "consoleUrlProvider"
        - "viewsTabBar"
        - "mailer"
        - "favorite"
        - myView:
            viewsTabBar: "standard"
        - preferredProvider:
            providerId: "default"
        - "timezone"
        - "experimentalFlags"
  slaveAgentPort: 50000
  systemMessage: "SDK Build System Demo — Jenkins"
  updateCenter:
    sites:
    - id: "default"
      url: "https://updates.jenkins.io/update-center.json"
  views:
  - all:
      name: "all"
  viewsTabBar: "standard"
globalCredentialsConfiguration:
