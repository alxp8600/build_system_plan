jenkins:
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
  crumbIssuer:
    standard:
      excludeClientIPFromCrumb: false
  disableRememberMe: false
  disabledAdministrativeMonitors:
  - "hudson.model.UpdateCenter$CoreUpdateMonitor"
  - "hudson.util.DoubleLaunchChecker"
  - "jenkins.monitor.JavaVersionRecommendationAdminMonitor-17-2026-03-31-DANGER"
  globalNodeProperties:
  - envVars:
      env:
      - key: "ANDROID_NDK_ROOT"
        value: "/opt/android-ndk-r26b"
      - key: "GIT_SSH_COMMAND"
        value: "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  labelAtoms:
  - name: "android"
  - name: "android-build"
  - name: "built-in"
  - name: "linux"
  - name: "linux-build"
  - name: "mac-build"
  - name: "windows-build"
  log: {
    }
  markupFormatter: "plainText"
  mode: NORMAL
  nodeMonitors:
  - "architecture"
  - "clock"
  - diskSpace:
      freeSpaceThreshold: "1GiB"
      freeSpaceWarningThreshold: "2GiB"
  - "swapSpace"
  - tmpSpace:
      freeSpaceThreshold: "1GiB"
      freeSpaceWarningThreshold: "2GiB"
  - "responseTime"
  nodes:
  - permanent:
      labelString: "android"
      launcher: "inbound"
      mode: EXCLUSIVE
      name: "android-build"
      nodeDescription: "android build"
      numExecutors: 2
      remoteFS: "/home/jenkins-master/jenkinsAgent"
      retentionStrategy: "always"
  - permanent:
      labelString: "linux"
      launcher: "inbound"
      mode: EXCLUSIVE
      name: "linux-build"
      numExecutors: 2
      remoteFS: "/home/jenkins/jenkinsAgent"
      retentionStrategy: "always"
  - permanent:
      launcher: "inbound"
      mode: EXCLUSIVE
      name: "mac-build"
      nodeDescription: "build mac jobs"
      numExecutors: 2
      remoteFS: "/Users/jenkins-agent/jenkinsAgent"
      retentionStrategy: "always"
  - permanent:
      launcher: "inbound"
      mode: EXCLUSIVE
      name: "windows-build"
      nodeDescription: "build win jobs"
      numExecutors: 2
      remoteFS: "C:\\JenkinsAgent\\workspace"
      retentionStrategy: "always"
  numExecutors: 2
  primaryView:
    all:
      name: "all"
  projectNamingStrategy: "standard"
  quietPeriod: 5
  remotingSecurity:
    enabled: true
  scmCheckoutRetryCount: 2
  securityRealm:
    local:
      allowsSignup: false
      enableCaptcha: false
      users:
      - id: "admin"
        name: "admin"
        properties:
        - "apiToken"
        - "consoleUrlProvider"
        - "viewsTabBar"
        - "mailer"
        - "favorite"
        - myView:
            viewsTabBar: "standard"
        - preferredProvider:
            providerId: "default"
        - "timezone"
        - "experimentalFlags"
  slaveAgentPort: 50000
  systemMessage: "SDK Build System Demo — Jenkins"
  updateCenter:
    sites:
    - id: "default"
      url: "https://updates.jenkins.io/update-center.json"
  views:
  - all:
      name: "all"
  - list:
      columns:
      - "status"
      - "weather"
      - "jobName"
      - "lastSuccess"
      - "lastFailure"
      - "lastDuration"
      - "buildButton"
      - "favoriteColumn"
